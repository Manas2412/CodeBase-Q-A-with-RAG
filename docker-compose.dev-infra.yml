# Dev-infra overlay: adds Gitea for local testing of provider abstraction,
# webhook flows, and the polling agent without hitting real OpenForge/GitHub.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev-infra.yml up -d
#
# Gitea web UI:  http://localhost:3001
# Gitea SSH:     ssh://localhost:2222
#
# First-time setup: open the web UI, complete the install wizard
# (use the codereview-postgres credentials and pick "PostgreSQL" → host
# "postgres", db "gitea", user "codereview", password "local_dev_only").
# Create a 'gitea' DB inside Postgres beforehand:
#   docker exec codereview-postgres psql -U codereview -d codereview \
#     -c "CREATE DATABASE gitea OWNER codereview;"

services:

  gitea:
    image: gitea/gitea:1.22
    container_name: codereview-gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: codereview
      GITEA__database__PASSWD: local_dev_only
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: http://localhost:3001/
      GITEA__server__HTTP_PORT: 3000
      GITEA__service__DISABLE_REGISTRATION: "false"
    ports:
      - "3001:3000"   # web UI
      - "2222:22"     # SSH for git push (rarely used in our tests)
    volumes:
      - codereview-gitea-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - codereview


volumes:
  codereview-gitea-data:
    name: codereview-gitea-data
