# Nginx config for serving the Vite-built SPA.
# Caddy (or any other front proxy) sits in front of this and handles TLS.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in headers
    server_tokens off;

    # Standard security headers — Caddy can override if it adds its own.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compress text-ish responses on the wire
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;

    # Hashed assets from Vite — cache hard
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe for compose / Caddy
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — every unknown route renders index.html and lets
    # react-router-dom take over on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
